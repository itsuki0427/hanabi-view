<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>hanabi-view - 関西花火 視認エリアマップ</title>
<link rel="stylesheet" href="./lib/maplibre-gl.css">
<style>
  html, body { margin: 0; padding: 0; height: 100%; font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", sans-serif; }
  #map { width: 100%; height: 100vh; }
  #panel {
    position: absolute; top: 12px; left: 12px; z-index: 1;
    background: rgba(255,255,255,0.96); padding: 12px 16px; border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2); max-width: 340px;
  }
  #panel h1 { margin: 0 0 8px; font-size: 16px; }
  #festival-select { width: 100%; padding: 6px; font-size: 14px; }
  #festival-info { margin-top: 8px; font-size: 12px; color: #444; line-height: 1.6; }
  #festival-info .note { color: #999; font-size: 11px; }
  #result { margin-top: 10px; font-size: 13px; line-height: 1.7; border-top: 1px solid #eee; padding-top: 8px; }
  #result .big { font-size: 15px; font-weight: 700; }
  #result .sub { color: #666; font-size: 12px; }
  #legend {
    position: absolute; bottom: 30px; right: 12px; z-index: 1;
    background: rgba(255,255,255,0.96); padding: 8px 12px; border-radius: 6px;
    font-size: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  #legend .row { display: flex; align-items: center; gap: 6px; margin: 2px 0; }
  #legend .swatch { width: 18px; height: 12px; border: 1px solid rgba(0,0,0,0.15); }
  .attribution {
    position: absolute; bottom: 4px; left: 4px; z-index: 1;
    background: rgba(255,255,255,0.8); padding: 2px 6px; font-size: 10px;
    border-radius: 3px;
  }
</style>
</head>
<body>
<div id="map"></div>
<div id="panel">
  <h1>関西花火 視認エリア</h1>
  <select id="festival-select">
    <option value="">花火大会を選択...</option>
  </select>
  <div id="festival-info"></div>
  <div id="result">地図の色付きエリアをクリックすると<br>その場所からの見え方を表示</div>
  <div style="margin-top:8px; font-size:10.5px; color:#999; line-height:1.5;">
    ※建物・地形のみで計算した目安です。樹木・電線等は未考慮。実際の見え方を保証するものではありません。
    <a href="https://github.com/itsuki0427/hanabi-view" target="_blank" rel="noopener" style="color:#999;">詳細</a>
  </div>
</div>
<div id="legend">
  <div style="font-weight:600; margin-bottom:4px;">花火の見え方</div>
  <div class="row"><span class="swatch" style="background:#1a9850"></span>ほぼ全部見える</div>
  <div class="row"><span class="swatch" style="background:#a6d96a"></span>低い花火は隠れる</div>
  <div class="row"><span class="swatch" style="background:#ffffbf"></span>高い花火だけ見える</div>
  <div class="row"><span class="swatch" style="background:#fdae61"></span>大玉の上部だけ</div>
  <div class="row"><span class="swatch" style="background:#d73027"></span>ほぼ見えない</div>
</div>
<div class="attribution">地図: 国土地理院 / 建物: PLATEAU（国土交通省）</div>

<script src="./lib/maplibre-gl.js"></script>
<script>
  const map = new maplibregl.Map({
    container: 'map',
    style: {
      version: 8,
      sources: {
        gsi: {
          type: 'raster',
          tiles: ['https://cyberjapandata.gsi.go.jp/xyz/pale/{z}/{x}/{y}.png'],
          tileSize: 256,
          attribution: '国土地理院',
        },
      },
      layers: [{ id: 'gsi', type: 'raster', source: 'gsi' }],
    },
    center: [135.5, 34.72],
    zoom: 11,
  });

  let festivals = [];
  let currentFestival = null;

  const FILL_COLOR = [
    'case',
    ['==', ['get', 'min_h'], -1], '#d73027',
    ['<=', ['get', 'min_h'], 30], '#1a9850',
    ['<=', ['get', 'min_h'], 100], '#a6d96a',
    ['<=', ['get', 'min_h'], 200], '#ffffbf',
    '#fdae61',
  ];

  // 'load' はタイル取得完了まで待つ（ネットワーク不調で発火しないことあり）
  // addSource/addLayer に必要なのはスタイル読込のみ → 'style.load' で初期化
  map.on('style.load', () => {
    fetch('./data/festivals.json?t=' + Date.now())
      .then(r => r.json())
      .then(list => {
        festivals = list;
        const sel = document.getElementById('festival-select');
        list.forEach(f => {
          const opt = document.createElement('option');
          opt.value = f.id;
          opt.textContent = f.name;
          sel.appendChild(opt);
        });
        if (list.length > 0) {
          sel.value = list[0].id;
          loadFestival(list[0].id);
        }
      });
  });

  document.getElementById('festival-select').addEventListener('change', (e) => {
    if (e.target.value) loadFestival(parseInt(e.target.value, 10));
  });

  function showFestivalInfo(f) {
    const notes = [];
    if (f.location_confidence !== 'official') notes.push('※打上地点は推定位置');
    if (f.height_provisional) notes.push('※花火の高さは暫定値（5号相当で計算）');
    if (f.ui_note) notes.push('※' + f.ui_note);
    const dateStr = f.date ? `${f.date}（${f.time}）` : '日程未発表';
    document.getElementById('festival-info').innerHTML =
      `<div>📅 ${dateStr}</div>` +
      `<div>📍 ${f.city} ／ 最大${f.max_shaku}号玉（開花 約${Math.round(f.max_burst_height_m)}m）</div>` +
      `<div><a href="${f.source_url}" target="_blank" rel="noopener">大会公式情報</a></div>` +
      notes.map(n => `<div class="note">${n}</div>`).join('');
  }

  function loadFestival(id) {
    const f = festivals.find(x => x.id === id);
    if (!f) return;
    currentFestival = f;
    showFestivalInfo(f);
    map.flyTo({ center: [f.lng, f.lat], zoom: 12 });

    fetch(`./data/result_${id}.geojson?t=` + Date.now())
      .then(r => {
        if (!r.ok) throw new Error('結果データなし');
        return r.json();
      })
      .then(data => {
        for (const layerId of ['viz', 'launch']) {
          if (map.getLayer(layerId)) map.removeLayer(layerId);
        }
        for (const srcId of ['result', 'launch_src']) {
          if (map.getSource(srcId)) map.removeSource(srcId);
        }

        map.addSource('result', { type: 'geojson', data });
        map.addLayer({
          id: 'viz', type: 'fill', source: 'result',
          paint: { 'fill-color': FILL_COLOR, 'fill-opacity': 0.45, 'fill-outline-color': 'rgba(0,0,0,0)' },
        });
        map.addSource('launch_src', {
          type: 'geojson',
          data: { type: 'Feature', geometry: { type: 'Point', coordinates: [f.lng, f.lat] }, properties: {} },
        });
        map.addLayer({
          id: 'launch', type: 'circle', source: 'launch_src',
          paint: {
            'circle-radius': 9,
            'circle-color': '#e91e8c',
            'circle-stroke-width': 2.5,
            'circle-stroke-color': '#fff',
          },
        });
      })
      .catch((err) => {
        document.getElementById('result').textContent = `結果データ未生成: ${err.message}`;
      });
  }

  map.on('click', 'viz', (e) => {
    if (!currentFestival) return;
    const p = e.features[0].properties;
    const maxH = currentFestival.max_burst_height_m;
    let headline, sub;
    if (p.min_h === -1) {
      headline = 'ここからは ほぼ見えない';
      sub = '建物・地形に遮られる（音だけ楽しめるかも）';
    } else if (p.min_h === 0) {
      headline = '低い花火まで ほぼ全部見える';
      sub = '遮るものなし。特等席クラス';
    } else {
      const visiblePct = Math.round((1 - p.ratio) * 100);
      headline = `高度 ${p.min_h}m 以上の花火が見える`;
      sub = `打上高度範囲の約${visiblePct}%が視認可（この大会の最大開花高度 約${Math.round(maxH)}m）`;
    }
    document.getElementById('result').innerHTML =
      `<div class="big">${headline}</div><div class="sub">${sub}</div>`;
  });
  map.on('mouseenter', 'viz', () => { map.getCanvas().style.cursor = 'pointer'; });
  map.on('mouseleave', 'viz', () => { map.getCanvas().style.cursor = ''; });
</script>
</body>
</html>
